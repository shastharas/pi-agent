services:
  pi-agent:
    image: ghcr.io/shastharas/pi-agent:latest
    container_name: netmon-agent
    restart: unless-stopped
    network_mode: host
    environment:
      CENTRAL_URL: https://your-central-url
      ENROLL_CODE: YOUR-ENROLLMENT-CODE
      PI_HOSTNAME: ${HOSTNAME:-pi}
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"